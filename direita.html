<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Fase 3 - Mistério Sem Respostas</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;

    background-image:url("chalé.png");
    background-position:center;
    background-repeat:no-repeat;
    background-size:cover;

    display:flex;
    justify-content:center;
    align-items:center;

    font-family:Arial, sans-serif;

    overflow:hidden;

    position:relative;
}

/* ESCURECER O FUNDO */

body::before{
    content:"";

    position:absolute;

    top:0;
    left:0;

    width:100%;
    height:100%;

    background:rgba(0,0,0,0.75);

    z-index:0;
}

.container{
    position:relative;

    z-index:1;

    width:80%;
    max-width:900px;

    background:rgba(0,0,0,0.5);

    padding:40px;

    border-radius:15px;

    border:1px solid rgba(255,255,255,0.1);

    backdrop-filter:blur(5px);

    animation:fade 2s ease;

    text-align:center;
}

h1{
    margin-bottom:30px;

    color:red;

    letter-spacing:3px;

    text-shadow:0 0 10px red;
}

#texto{
    color:#ddd;

    font-size:22px;

    line-height:40px;

    min-height:220px;
}

/* BOTÕES */

button{
    margin-top:30px;

    padding:15px 30px;

    font-size:18px;

    border:none;

    border-radius:10px;

    background:red;

    color:white;

    cursor:pointer;

    display:none;

    transition:0.3s;

    margin-right:10px;
}

button:hover{
    transform:scale(1.05);

    box-shadow:0 0 15px red;
}

@keyframes fade{

    from{
        opacity:0;
        transform:translateY(20px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }
}

</style>

</head>

<body>

<div class="container">

    <h1>CHALÉ</h1>

    <div id="texto"></div>

    <button id="btn1" onclick="continuar1()">
        INVESTIGAR COZINHA
    </button>

    <button id="btn2" onclick="continuar2()">
        INVESTIGAR QUARTOS
    </button>

    <button id="btn3" onclick="continuar3()">
        INVESTIGAR SALA
    </button>

</div>

<script>

const historia = `
Passando pelo caminho da direita, um pouco mais estreito,
você se depara com um pequeno chalé desgastado.

Edward bate na porta e é atendido por um homem simpático,
que o convida para entrar em sua residência.

Dentro, você explica o porquê de estar ali,
e o homem diz que não viu nenhuma mulher que bata,
até então, com a descrição que você fez.

Ele sai por um momento para pegar lenha para a fogueira,
e esse é o tempo para tomar uma decisão...
`;

let i = 0;

function escreverTexto(){

    if(i < historia.length){

        document.getElementById("texto").innerHTML += historia.charAt(i);

        i++;

        setTimeout(escreverTexto, 30);

    } else {

        document.getElementById("btn1").style.display = "inline-block";
        document.getElementById("btn2").style.display = "inline-block";
        document.getElementById("btn3").style.display = "inline-block";
    }
}

escreverTexto();

function continuar1(){

    window.location.href = "cozinha.html";
}

function continuar2(){

    window.location.href = "quartos.html";
}

function continuar3(){

    window.location.href = "sala.html";
}

</script>

</body>
</html>
