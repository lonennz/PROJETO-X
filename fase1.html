<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Fase 1 - Mistério Sem Respostas</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;

    background:url("fase1.png") no-repeat center center;
    background-size:cover;

    display:flex;
    justify-content:center;
    align-items:center;

    font-family:Arial, sans-serif;

    overflow:hidden;
}

body::before{
    content:"";
    position:absolute;

    width:100%;
    height:100%;

    background:rgba(0,0,0,0.75);
}

.container{
    position:relative;
    z-index:1;

    width:80%;
    max-width:900px;

    background:rgba(0,0,0,0.5);

    padding:40px;

    border-radius:15px;

    border:1px solid rgba(255,255,255,0.1);

    backdrop-filter:blur(5px);

    animation:fade 2s ease;
}

h1{
    text-align:center;

    margin-bottom:30px;

    color:red;

    letter-spacing:3px;
}

#texto{
    color:#ddd;

    font-size:22px;

    line-height:40px;

    min-height:220px;
}

button{
    margin-top:30px;

    padding:15px 30px;

    font-size:18px;

    border:none;

    border-radius:10px;

    background:red;

    color:white;

    cursor:pointer;

    display:none;

    transition:0.3s;
}

button:hover{
    transform:scale(1.05);

    box-shadow:0 0 15px red;
}

#skipBtn{
    display:block;

    position:absolute;

    top:20px;

    right:20px;

    background:#444;
}

#skipBtn:hover{
    background:red;
}

@keyframes fade{

    from{
        opacity:0;
        transform:translateY(20px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }
}

</style>

</head>

<body>

<div class="container">

    <h1>INVESTIGAÇÃO</h1>

    <div id="texto"></div>

<button id="skipBtn">PULAR</button>

<button onclick="continuar()">ENTRAR NA FLORESTA</button>

</div>

<script>

const historia = `

Edward chega até a área residencial e pergunta às pessoas da cidade por informações relevantes sobre o desaparecimento da menina e sobre coisas estranhas ocorrendo nas redondezas.

Os moradores dizem que sempre sentem uma energia pesada ao redor da floresta e comentam que já avistaram pessoas estranhas adentrando-a.

Com isso, Edward tem seu destino traçado até a macabra floresta.

`;

let i = 0;
let timeoutTexto;

const texto = document.getElementById("texto");
const botaoEntrar = document.querySelector('button[onclick="continuar()"]');
const skipBtn = document.getElementById("skipBtn");

function escreverTexto(){

    if(i < historia.length){

        texto.innerHTML += historia.charAt(i);

        i++;

        timeoutTexto = setTimeout(escreverTexto, 30);
    }

    else{

        botaoEntrar.style.display = "block";
        skipBtn.style.display = "none";
    }
}

function skipTexto(){

    clearTimeout(timeoutTexto);

    texto.innerHTML = historia;

    botaoEntrar.style.display = "block";

    skipBtn.style.display = "none";
}

skipBtn.addEventListener("click", skipTexto);

escreverTexto();

function continuar(){

    window.location.href = "fase2.html";

}

</script>

</body>
</html>
