<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Introdução - Mistério Sem Respostas</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    background:url("mesa.png") no-repeat center center;
    background-size:cover;

    display:flex;
    justify-content:center;
    align-items:center;

    font-family:Arial, sans-serif;
    color:white;
    overflow:hidden;
}

body::before{
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.75);
}

.container{
    position:relative;
    z-index:1;

    width:80%;
    max-width:900px;

    background:rgba(0,0,0,0.5);

    padding:40px;

    border-radius:15px;

    border:1px solid rgba(0, 0, 0, 0.1);

    backdrop-filter:blur(5px);

    animation:fade 2s ease;
}

h1{
    text-align:center;
    margin-bottom:30px;
    letter-spacing:3px;
    color:red;
}

#texto{
    font-size:20px;
    line-height:35px;
    color:#ddd;
    min-height:250px;
}

button{
    margin-top:30px;

    padding:15px 30px;

    font-size:18px;

    border:none;

    border-radius:10px;

    background:red;
    color:white;

    cursor:pointer;

    display:none;

    transition:0.3s;
}

button:hover{
    transform:scale(1.05);
    box-shadow:0 0 15px red;
}

/* BOTÃO PULAR */

#skipBtn{
    display:block;

    position:absolute;

    top:20px;

    right:20px;

    background:#444;
}

#skipBtn:hover{
    background:red;
}

@keyframes fade{
    from{
        opacity:0;
        transform:translateY(20px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }
}

</style>

</head>

<body>

<div class="container">

    <h1>MISTÉRIO SEM RESPOSTAS</h1>

    <div id="texto"></div>

    <button id="skipBtn">PULAR</button>

    <button onclick="continuar()">INICIAR INVESTIGAÇÃO</button>

</div>

<script>

const historia = `

A história começa com Edward Elliot, um investigador criminal que está no final de sua carreira após anos trabalhando em casos pouco conhecidos e desinteressantes.

Até que, um dia, um homem misterioso aparece em seu escritório à sua procura para contratar seus serviços, a fim de investigar o desaparecimento de sua filha, Sarah Grayson.

Edward chega até a área residencial e pergunta aos moradores por informações relevantes sobre o desaparecimento da menina.

Os residentes comentam sobre acontecimentos estranhos na região.

Muitos dizem sentir uma energia pesada próxima à floresta.

Outros afirmam ter visto pessoas desconhecidas entrando na mata durante a noite.

Agora, Edward precisa descobrir o que realmente aconteceu com Sarah Grayson.

`;

let i = 0;
let timeoutTexto;

const texto = document.getElementById("texto");
const botaoIniciar = document.querySelector('button[onclick="continuar()"]');
const skipBtn = document.getElementById("skipBtn");

function escreverTexto(){

    if(i < historia.length){

        texto.innerHTML += historia.charAt(i);

        i++;

        timeoutTexto = setTimeout(escreverTexto, 30);
    }

    else{

        botaoIniciar.style.display = "block";

        skipBtn.style.display = "none";
    }
}

function skipTexto(){

    clearTimeout(timeoutTexto);

    texto.innerHTML = historia;

    botaoIniciar.style.display = "block";

    skipBtn.style.display = "none";
}

skipBtn.addEventListener("click", skipTexto);

escreverTexto();

function continuar(){

    alert("A investigação começou...");

    window.location.href = "fase1.html";
}

</script>

</body>
</html>
