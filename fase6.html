<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Fase 6 - Mistério Sem Respostas</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;

    background-image:url("porão.jpg");
    background-position:center;
    background-repeat:no-repeat;
    background-size:cover;

    display:flex;
    justify-content:center;
    align-items:center;

    font-family:Arial, sans-serif;

    overflow:hidden;

    position:relative;
}

/* ESCURECER O FUNDO */

body::before{
    content:"";

    position:absolute;

    top:0;
    left:0;

    width:100%;
    height:100%;

    background:rgba(0,0,0,0.75);

    z-index:0;
}

.container{
    position:relative;

    z-index:1;

    width:80%;
    max-width:900px;

    background:rgba(0,0,0,0.5);

    padding:40px;

    border-radius:15px;

    border:1px solid rgba(255,255,255,0.1);

    backdrop-filter:blur(5px);

    animation:fade 2s ease;

    text-align:center;
}

h1{
    margin-bottom:30px;

    color:red;

    letter-spacing:3px;

    text-shadow:0 0 10px red;
}

#texto{
    color:#ddd;

    font-size:22px;

    line-height:40px;

    min-height:220px;
}

/* BOTÕES */

button{
    margin-top:30px;

    padding:15px 30px;

    font-size:18px;

    border:none;

    border-radius:10px;

    background:red;

    color:white;

    cursor:pointer;

    display:none;

    transition:0.3s;

    margin-right:10px;
}

button:hover{
    transform:scale(1.05);

    box-shadow:0 0 15px red;
}

/* BOTÃO PULAR */

#skipBtn{
    display:block;

    position:absolute;

    top:20px;

    right:20px;

    background:#444;
}

#skipBtn:hover{
    background:red;
}

@keyframes fade{

    from{
        opacity:0;
        transform:translateY(20px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }
}

</style>

</head>

<body>

<div class="container">

    <h1>PORÃO DA IGREJA</h1>

    <div id="texto"></div>

    <button id="skipBtn">PULAR</button>

    <button id="btn1" onclick="continuar1()">
       AVANÇAR

</div>

<script>

const historia = `
Ela estava amarrada. Então, você a desamarra e a acorda. Sarah finalmente vê um raio de esperança e lhe agradece. Ela explica que foi parar ali após sair para uma trilha com os amigos naquela região, mas acabou se perdendo deles. Depois de pedir ajuda a um senhorzinho em um chalé, foi levada para aquele lugar e mantida presa desde então.
`

let i = 0;
let timeoutTexto;

const texto = document.getElementById("texto");
const skipBtn = document.getElementById("skipBtn");

function mostrarBotoes(){

    document.getElementById("btn1").style.display = "inline-block";
    
    skipBtn.style.display = "none";
}

function escreverTexto(){

    if(i < historia.length){

        texto.innerHTML += historia.charAt(i);

        i++;

        timeoutTexto = setTimeout(escreverTexto, 30);

    } 
    
    else {

        mostrarBotoes();
    }
}

function skipTexto(){

    clearTimeout(timeoutTexto);

    texto.innerHTML = historia;

    mostrarBotoes();
}

skipBtn.addEventListener("click", skipTexto);

escreverTexto();

function continuar1(){

    window.location.href = "fase7.html";
}
</script>

</body>
</html>
