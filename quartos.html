<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Quartos - Mistério Sem Respostas</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;

    background-image:url("quartos.jpg");
    background-position:center;
    background-repeat:no-repeat;
    background-size:cover;

    display:flex;
    justify-content:center;
    align-items:center;

    font-family:Arial, sans-serif;

    overflow:hidden;

    position:relative;
}

/* ESCURECER FUNDO */

body::before{
    content:"";

    position:absolute;

    top:0;
    left:0;

    width:100%;
    height:100%;

    background:rgba(0,0,0,0.75);

    z-index:0;
}

.container{
    position:relative;

    z-index:1;

    width:80%;
    max-width:900px;

    background:rgba(0,0,0,0.5);

    padding:40px;

    border-radius:15px;

    border:1px solid rgba(255,255,255,0.1);

    backdrop-filter:blur(5px);

    animation:fade 2s ease;

    text-align:center;
}

h1{
    margin-bottom:30px;

    color:red;

    letter-spacing:3px;

    text-shadow:0 0 10px red;
}

#texto{
    color:#ddd;

    font-size:22px;

    line-height:40px;

    min-height:220px;
}

/* BOTÕES */

button{
    margin-top:30px;

    padding:15px 30px;

    font-size:18px;

    border:none;

    border-radius:10px;

    background:red;

    color:white;

    cursor:pointer;

    display:none;

    transition:0.3s;

    margin-right:10px;
}

button:hover{
    transform:scale(1.05);

    box-shadow:0 0 15px red;
}

/* BOTÃO PULAR */

#skipBtn{
    display:block;

    position:absolute;

    top:20px;

    right:20px;

    background:#444;
}

#skipBtn:hover{
    background:red;
}

@keyframes fade{

    from{
        opacity:0;
        transform:translateY(20px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }
}

</style>

</head>

<body>

<div class="container">

    <h1>QUARTOS</h1>

    <div id="texto"></div>

    <button id="skipBtn">PULAR</button>

    <button id="btn1" onclick="continuar1()">
       PULAR PELA JANELA
    </button>

    <button id="btn2" onclick="continuar2()">
       SAIR DE FININHO
    </button>

    <button id="btn3" onclick="continuar3()">
       SE ESCONDER
    </button>

</div>

<script>

const historia = `
Edward vai até os quartos para checá-los e, assim como os outros cômodos, parece tudo normal a princípio. Mas você abre uma das gavetas e encontra uma carta suspeita. Essa carta contém as iniciais “S.G.” e um pedido de socorro com a localização do chalé, que nunca foi enviado.

A filha do homem estava aqui, mas você chegou tarde demais.

Você ouve um barulho alto na porta da frente da casa. Pessoas de sobretudo invadem a residência e, junto delas, é possível ver o dono da casa. Provavelmente, ele é cúmplice dessa loucura.

Agora, Edward tem que tomar uma decisão rápido...
`;

let i = 0;
let timeoutTexto;

const texto = document.getElementById("texto");
const skipBtn = document.getElementById("skipBtn");

function mostrarBotoes(){

    document.getElementById("btn1").style.display = "inline-block";
    document.getElementById("btn2").style.display = "inline-block";
    document.getElementById("btn3").style.display = "inline-block";

    skipBtn.style.display = "none";
}

function escreverTexto(){

    if(i < historia.length){

        texto.innerHTML += historia.charAt(i);

        i++;

        timeoutTexto = setTimeout(escreverTexto, 30);

    } 
    
    else {

        mostrarBotoes();
    }
}

function skipTexto(){

    clearTimeout(timeoutTexto);

    texto.innerHTML = historia;

    mostrarBotoes();
}

skipBtn.addEventListener("click", skipTexto);

escreverTexto();

function continuar1(){

    window.location.href = "pular.html";
}

function continuar2(){

    window.location.href = "sair.html";
}

function continuar3(){

    window.location.href = "esconder.html";
}

</script>

</body>
</html>
